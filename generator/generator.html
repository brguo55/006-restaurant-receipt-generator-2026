<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hunam Demo Order Page</title>
    <link rel="stylesheet" href="generator.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Hunam Demo</h1>
        <div class="small">
          先做 demo：English-only / English+Chinese 显示，小票生成。后面我再帮你换成 CSV 导入版。
        </div>
        <div class="top">
          <div>
            <label>Display</label>
            <select id="mode">
              <option value="en">English only</option>
              <option value="both">English + Chinese</option>
            </select>
          </div>
          <div>
            <label>Order Type</label>
            <select id="type">
              <option>Dine In</option>
              <option>Take Out</option>
            </select>
          </div>
          <div>
            <label>Table / Customer</label>
            <input id="who" placeholder="Table 5 / John" />
          </div>
        </div>
        <div>
          <label>Note</label>
          <textarea id="note" placeholder="Special instructions..."></textarea>
        </div>
        <div id="menu"></div>
      </div>

      <div class="card">
        <h2>Order</h2>
        <div id="order"></div>
        <div class="sum">
          <span>Subtotal</span><span id="subtotal">$0.00</span>
        </div>
        <div class="sum total">
          <span>Total</span><span id="total">$0.00</span>
        </div>
        <div class="actions">
          <button class="primary" id="gen">Generate Receipt</button>
          <button class="secondary" id="clear">Clear</button>
          <button class="secondary" id="printBtn">Print</button>
        </div>
        <div id="receipt" class="receipt"></div>
      </div>
    </div>
    <script src="generator.js"></script>
  </body>
</html>
